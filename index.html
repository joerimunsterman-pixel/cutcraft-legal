<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CutCraft</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .container {
    max-width: 600px;
    text-align: center;
  }
  h1 {
    font-size: 4rem;
    font-weight: 900;
    letter-spacing: -2px;
    margin-bottom: 1rem;
    background: linear-gradient(135deg, #fff 0%, #888 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .tagline {
    font-size: 1.25rem;
    color: #aaa;
    margin-bottom: 3rem;
  }
  .links {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  a {
    color: #fff;
    text-decoration: none;
    padding: 0.75rem 1.5rem;
    border: 1px solid #333;
    border-radius: 8px;
    transition: all 0.2s;
  }
  a:hover {
    background: #fff;
    color: #000;
  }
  .accent { color: #ff3b3b; }
</style>
</head>
<body>
<div class="container">
  <h1>Cut<span class="accent">Craft</span></h1>
  <p class="tagline">Best moments from Kick.com livestreams</p>
  <div class="links">
    <a href="terms.html">Terms of Service</a>
    <a href="privacy.html">Privacy Policy</a>
  </div>
</div>
</body>
</html>
